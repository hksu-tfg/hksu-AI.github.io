<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouBike 2.0 探索地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f8fafc;
        }

        #map-container {
            position: relative;
            height: 450px;
            width: 100%;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* 中心定位標記 */
        .map-center-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-dot {
            width: 12px;
            height: 12px;
            background-color: #6366f1;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.8);
        }

        .center-ring {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #6366f1;
            border-radius: 50%;
            opacity: 0.3;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            70% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        .custom-loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="max-w-5xl mx-auto px-4 pt-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">🚲 YouBike 2.0 探索儀表板</h1>
                <p class="text-slate-500 mt-1 italic">移動地圖中心，自動尋找周邊站點</p>
            </div>
            <div class="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-100 text-sm flex items-center gap-2">
                <div id="sync-loader" class="custom-loader hidden"></div>
                <span class="text-slate-400">狀態：</span>
                <span id="status-text" class="text-indigo-600 font-medium">準備就緒</span>
            </div>
        </header>

        <!-- Map Section -->
        <div id="map-container" class="mb-8 border border-slate-100">
            <div id="map"></div>
            <div class="map-center-mark">
                <div class="center-ring"></div>
                <div class="center-dot"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Info -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-lg shadow-indigo-200">
                    <h2 class="text-lg font-bold mb-2">探索模式</h2>
                    <p class="text-indigo-100 text-sm mb-4 leading-relaxed">
                        目前以地圖中心標記為基準計算。請直接拖曳或縮放地圖。
                    </p>
                    <div class="bg-indigo-700/50 rounded-2xl p-4 border border-indigo-400/30">
                        <p class="text-xs text-indigo-200 uppercase font-bold tracking-wider mb-1">中心座標</p>
                        <p id="center-coords" class="font-mono text-sm">--</p>
                    </div>
                </div>
                
                <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4">圖例說明</h3>
                    <div class="space-y-3 text-sm">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                                <span class="text-slate-600">車輛充沛</span>
                            </div>
                            <span class="text-xs text-slate-400">> 5 台</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-3 h-3 rounded-full bg-orange-500"></div>
                                <span class="text-slate-600">車輛較少</span>
                            </div>
                            <span class="text-xs text-slate-400">1-5 台</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-3 h-3 rounded-full bg-rose-500"></div>
                                <span class="text-slate-600">目前無車</span>
                            </div>
                            <span class="text-xs text-slate-400">0 台</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right List -->
            <div class="lg:col-span-2">
                <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><path d="m21 21-4.3-4.3"/><circle cx="10" cy="10" r="7"/><path d="M10 7v6"/><path d="M7 10h6"/></svg>
                    距離中心最近站點
                </h2>
                <div id="station-list" class="space-y-4">
                    <div class="text-center py-12 bg-white rounded-3xl text-slate-400 border border-slate-100 italic">
                        移動地圖以搜尋站點...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL = 'https://tcgbusfs.blob.core.windows.net/dotapp/youbike/v2/youbike_immediate.json';
        const INITIAL_CENTER = [25.0478, 121.5170]; 
        
        let map;
        let stationMarkers = [];
        let allStationsData = [];
        let isFetching = false;

        const statusText = document.getElementById('status-text');
        const syncLoader = document.getElementById('sync-loader');
        const centerCoordsDisplay = document.getElementById('center-coords');
        const stationList = document.getElementById('station-list');

        function initMap() {
            map = L.map('map', {
                center: INITIAL_CENTER,
                zoom: 16,
                zoomControl: false
            });

            L.control.zoom({ position: 'bottomright' }).addTo(map);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            map.on('move', handleMapMove);
            map.on('moveend', updateStationDisplay);
            handleMapMove(); 
        }

        function handleMapMove() {
            const center = map.getCenter();
            centerCoordsDisplay.textContent = `${center.lat.toFixed(5)}, ${center.lng.toFixed(5)}`;
        }

        async function fetchAllData() {
            if (isFetching) return;
            isFetching = true;
            syncLoader.classList.remove('hidden');
            statusText.textContent = '更新資料中...';

            try {
                const response = await fetch(API_URL, { cache: "no-cache" });
                const rawData = await response.json();
                
                // 數據清洗：統一欄位名稱，過濾掉座標無效的站點
                allStationsData = rawData.map(s => ({
                    ...s,
                    // 兼容不同版本的 API 欄位
                    lat: s.lat || s.latitude,
                    lng: s.lng || s.longitude,
                    sbi: s.sbi !== undefined ? s.sbi : (s.available_rent_bikes || 0),
                    sna: s.sna || "未知站點"
                })).filter(s => s.lat !== undefined && s.lng !== undefined);

                statusText.textContent = '資料已同步';
                updateStationDisplay();
            } catch (error) {
                console.error('API Error:', error);
                statusText.textContent = '連線失敗';
            } finally {
                isFetching = false;
                syncLoader.classList.add('hidden');
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function updateStationDisplay() {
            if (allStationsData.length === 0) return;

            const center = map.getCenter();
            
            const sorted = allStationsData.map(s => ({
                ...s,
                distance: getDistance(center.lat, center.lng, s.lat, s.lng)
            })).sort((a, b) => a.distance - b.distance);

            const topNearby = sorted.slice(0, 15);
            const listTop5 = topNearby.slice(0, 5);

            renderMapMarkers(topNearby);
            renderList(listTop5);
        }

        function renderMapMarkers(stations) {
            stationMarkers.forEach(m => map.removeLayer(m));
            stationMarkers = [];

            stations.forEach(s => {
                // 確保座標存在才建立 Marker
                if (s.lat === undefined || s.lng === undefined) return;

                const markerColor = s.sbi === 0 ? '#f43f5e' : (s.sbi < 5 ? '#f59e0b' : '#10b981');
                const marker = L.circleMarker([s.lat, s.lng], {
                    radius: 8,
                    fillColor: markerColor,
                    color: "white",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map).bindPopup(`
                    <div class="font-bold text-slate-800">${s.sna.replace('YouBike2.0_', '')}</div>
                    <div class="text-sm text-slate-500">可用車輛：<span class="font-bold text-slate-800">${s.sbi}</span></div>
                `);
                stationMarkers.push(marker);
            });
        }

        function renderList(stations) {
            stationList.innerHTML = '';
            stations.forEach(s => {
                const cleanName = s.sna.replace('YouBike2.0_', '');
                const bikeColor = s.sbi === 0 ? 'text-rose-500' : (s.sbi < 5 ? 'text-orange-500' : 'text-emerald-500');
                const distanceM = (s.distance * 1000).toFixed(0);

                const card = document.createElement('div');
                card.className = 'bg-white p-5 rounded-3xl border border-slate-100 flex items-center justify-between shadow-sm hover:shadow-md transition-all cursor-pointer group';
                card.onclick = () => {
                    map.flyTo([s.lat, s.lng], 18);
                };

                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="bg-slate-50 p-3 rounded-2xl group-hover:bg-indigo-50 transition-colors text-center min-w-[70px]">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">距離</p>
                            <p class="text-sm font-black text-indigo-600">${distanceM}m</p>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-800 group-hover:text-indigo-600 transition-colors">${cleanName}</h4>
                            <p class="text-xs text-slate-400 mt-1 truncate max-w-[150px]">${s.ar || "無地址資訊"}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-black ${bikeColor}">${s.sbi}</div>
                        <div class="text-[10px] text-slate-300 font-bold uppercase tracking-tighter">Bikes</div>
                    </div>
                `;
                stationList.appendChild(card);
            });
        }

        window.onload = () => {
            initMap();
            fetchAllData();
            setInterval(fetchAllData, 60000);
        };
    </script>
</body>
</html>
