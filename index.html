<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人導覽入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 3rem 2rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .nav-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: none;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.25rem;
            border-radius: 1rem;
            background: white;
            color: #4a5568;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background: #4f46e5;
            color: white;
        }

        .nav-button:active {
            transform: translateY(0);
        }

        .icon {
            margin-right: 0.75rem;
            font-size: 1.2rem;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card fade-in">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">歡迎回來</h1>
        <p class="text-gray-500 mb-8">請選擇您想前往的應用程式</p>

        <div class="space-y-4">
            <!-- 2048 遊戲按鈕 -->
            <button onclick="navigateTo('2048.html')" class="nav-button group">
                <span class="icon">🎮</span>
                <span>經典 2048 遊戲</span>
            </button>

            <!-- AI 圖片按鈕 -->
            <button onclick="navigateTo('ai_photo.html')" class="nav-button group">
                <span class="icon">🎨</span>
                <span>AI 智慧相簿</span>
            </button>

            <!-- YouBike 按鈕 -->
            <button onclick="navigateTo('youbike.html')" class="nav-button group">
                <span class="icon">🚲</span>
                <span>YouBike 即時資訊</span>
            </button>
        </div>

        <footer class="mt-8 text-xs text-gray-400">
            &copy; 2024 個人專案入口網
        </footer>
    </div>

    <!-- 簡單的訊息彈窗組件 -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none">
        正在跳轉中...
    </div>

    <script>
        function navigateTo(url) {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            
            // 模擬點擊效果後延遲跳轉
            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }
    </script>
</body>
</html>
